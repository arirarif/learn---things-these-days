<script type="text/markdown" id="lesson-6"># Day 6 — Risk vs Return

Today you build a scam detector. Permanently. Anyone showing you an investment, a "scheme," a "tip," or a "guaranteed return" will be processed through the framework you learn today. After this lesson, the noise of the financial world becomes a lot quieter, because most of what's being sold to you reveals itself as either bad math or outright fraud.

---

## 1. Why this matters

A Facebook ad: *"30% monthly returns through forex! Send only 50,000 BDT to get started. I made 5 lakh in my first 3 months!"*

Without today's lesson, you might think: "Maybe? Worth a shot?"

With today's lesson, you'll instantly know: 30% per month = 2,229% per year (compounded). That's so high it would mean the person could turn 50,000 BDT into approximately 11 *crore* in a single year. If this worked, the person posting wouldn't be on Facebook trying to recruit you for 50k — they'd already own a private island.

It's a scam. Always. Without exception.

That's just one example. Today's lesson is the systematic framework — not just for spotting forex scams, but for evaluating *every* investment, opportunity, business pitch, and "deal" that will come at you for the rest of your life.

The framework has two parts:
1. **The risk-return spectrum** — where any opportunity sits, and what return is plausible at that risk
2. **The scam detection checklist** — what red flags reveal that something isn't what it claims

By the end of today, both will be permanently installed.

---

## 2. The concept

### The fundamental law of finance

> **Higher returns require higher risk. There are no exceptions.**

This is as close to a universal law as exists in finance. It's not "usually true." It's "always true, in proportion."

If anyone offers you a return higher than you'd typically get from the broader market at that risk level, they're either:
1. **Wrong** (don't understand the risk they're taking)
2. **Lucky** (got a result that won't repeat)
3. **Lying** (a scam, a Ponzi, or wishful sales pitch)

There is no fourth option called "genuine, sustainable, low-risk high return." It doesn't exist. If it did, every institutional investor in the world would already be using it, and you wouldn't be hearing about it from a relative's WhatsApp message.

### The risk-return spectrum

Here's the spectrum, with realistic Bangladesh examples for each level:

#### Tier 1: Essentially Risk-Free (3-7% nominal)
- Bank savings accounts (3-4%)
- Sukuk / government bonds
- Bangladesh Bank deposits
- Mudaraba savings at major Islamic banks (5-6%)

You're effectively lending money to a very safe entity. Your money is *very* unlikely to disappear. But it barely beats (or loses to) inflation.

#### Tier 2: Very Low Risk (7-11% nominal)
- DPS / FDR (Mudaraba Term Deposit) at established banks (~7-10%)
- 5-Year Bangladesh Sanchaypatra (~11%)
- High-grade corporate sukuk
- Money market funds

Small lock-in period or some restrictions, but principal is nearly guaranteed by major institutions or government.

#### Tier 3: Low to Medium Risk (10-15% expected, long-term)
- Diversified blue-chip Bangladeshi stocks held 10+ years (Square Pharma, BATBC, Renata, GP, etc.) — *average* return ~12-15%
- Diversified halal equity index funds (Wahed, etc.)
- Real estate in established Dhaka areas — *long-term* return roughly inflation + 3-5%

Year-to-year fluctuation can be big (a stock might drop 30% in a year and recover later), but *long-term* and *diversified*, returns are meaningfully better than Tier 1-2.

#### Tier 4: Medium to High Risk (15-25% expected, but variable)
- Concentrated single-stock positions
- Small-cap stocks in DSE
- Speculative real estate (flipping, undeveloped land)
- Buying into a friend's small business
- Cryptocurrency held long-term (controversial — also illegal in Bangladesh)

Outcomes vary enormously. Some years +50%, some years −50%. Long-term average for *skilled* investors might reach 18-20%. Long-term average for *unskilled* investors is much worse — often negative.

#### Tier 5: Very High Risk / Gambling (could be anything from −100% to massive gain)
- Active forex trading
- Day trading individual stocks
- Crypto trading (not holding — trading)
- Lottery tickets
- Trying to predict short-term market moves
- Most "schemes"

Expected long-term return for retail participants: **negative**. Most lose. A few get lucky. The lucky ones post on social media. The losers stay silent. This is survivorship bias in action.

#### Tier 6: Fraud / Ponzi territory (advertised 30%+ monthly, "guaranteed")
- MLM schemes that pay early entrants from later entrants' deposits
- "Forex signals" / "trading bots" / "managed accounts" with guaranteed returns
- "Investment clubs" your relative is now promoting heavily
- WhatsApp / Telegram "exclusive opportunities"

These have a mathematical inevitability: anyone who joins early gets paid (for a while). Anyone who joins late loses everything. The system collapses when new deposits can't cover old withdrawals.

---

### How to use the spectrum

When anyone offers you anything:

1. **Locate it on the spectrum.** What tier does the *claimed* return suggest?
2. **Locate the *actual* risk.** Is the risk being honestly disclosed?
3. **If claimed return > what that tier delivers** → red flag. The claim is too good for the stated risk.

Example: someone offers you "12-15% return on lending to my small business." That's a Tier 3 / Tier 4 risk (small business lending — they could fail). 12-15% is plausible for that risk level. **Plausible** doesn't mean "do it" — but the math isn't fishy.

Example: someone offers "12-15% per *month* on lending to their business." That's claiming Tier 5+ returns. 144-180% annualized. **Impossible for a legitimate business to pay sustainably.** Either they're using new money to pay old money (Ponzi), or they're lying about their numbers.

---

### Volatility vs Permanent Loss

A subtle but crucial distinction:

**Volatility** = the price goes up and down. Doesn't necessarily mean you lose. If you hold through dips, you still get the long-term return.

**Permanent loss** = the asset itself fails. The company goes bankrupt. The scheme collapses. You don't recover.

A diversified portfolio of blue-chip stocks: **high volatility, low permanent-loss risk**. (Even if 1-2 companies fail, the portfolio survives.)

A single small-cap stock: **high volatility, meaningful permanent-loss risk**. (The one company can fail entirely.)

A Ponzi scheme: **looks like low volatility until it collapses, then 100% permanent loss**. (The most dangerous combination — feels safe right up until catastrophe.)

**Most beginners are terrified of volatility and underestimate permanent loss.** They sell stocks during a dip (volatility scared them) and then buy into Ponzi schemes (low volatility right up until total loss). The opposite is correct: tolerate volatility in *good* investments; avoid anything with permanent-loss risk.

---

### Survivorship bias

You'll hear "my friend invested in [X] and made 5 lakh in 6 months."

You **never** hear "my friend invested in [Y] and lost everything." Because:
1. People don't post about their losses
2. Losers often disappear from the community
3. The wins are publicized, the losses are private

This means **everything you hear about "great investments" is filtered through a winner-survivor lens.** The 100 people who lost everything in the same scheme are invisible. The 1 who won shows up on Facebook with a Mercedes photo.

**Defense:** assume that for every "winner" you hear about in a non-broad-market investment, there are 10-50 silent losers. If you wouldn't take the bet at those odds, don't take it because of one visible winner.

---

## 3. Worked examples

### Example A — Evaluating a "lend to my friend's business at 18% per year" offer

Friend's business: 4-year-old shop. Friend wants to expand. Offers you 18% per year on a 2-year loan, paid quarterly.

**Risk analysis:**
- Small business default risk: meaningful (maybe 15-25% of small businesses in Bangladesh fail in any given 5-year window)
- Friend is trustworthy but not infallible
- Your money is locked up — no early withdrawal
- 18% per year is a Tier 3-4 return

**Plausibility:** Yes. 18% is plausible compensation for the risk you're taking. The math is honest.

**Should you do it?** Depends:
- Can you afford to lose this money? (If it's 50% of your savings — no. If it's 5% of your savings — maybe.)
- Do you trust the friend AND the business?
- Have you seen the business's actual financials?
- Is there a written agreement?

**Verdict:** plausible offer, but only at a small portion of your wealth, with full information. Pass otherwise.

### Example B — The "forex / signals" scam

Telegram group: "We share trading signals. Last month our group made average 40% return. Join for 5,000 BDT/month subscription."

**Math:**
- 40% per month = 5,599% per year compounded
- Tier 6 territory. Impossible.

**Where the money actually comes from:**
- Subscriptions from new members (the real "product")
- Affiliate commissions from forex brokers (who profit from your losing trades)
- Many of the "winning trade" screenshots are faked or cherry-picked

**Verdict:** scam. Walk away. Block the contact. Don't engage to "see how it works" — engagement leads to harder pitches.

### Example C — A relative's MLM pitch

Relative says: "I joined this network. You buy a 30,000 BDT 'starter kit,' then recruit 3 people who each buy a kit, and you earn 5,000 from each recruit. Plus your downline keeps earning."

**Math:**
- For everyone in the group to make money, the network must grow exponentially
- 3 people → 9 → 27 → 81 → 243 → 729 → 2,187 (level 7)
- Within 8-10 levels, you've recruited more people than the population of Dhaka
- Mathematically impossible to sustain → someone at the bottom always loses

**The product** ("kit") is usually overpriced trinkets or low-quality goods. The real "product" is the recruitment.

**Verdict:** classic pyramid / MLM. Even if technically not illegal, the math guarantees losses for most participants. Decline politely. Don't argue (relatives feel attacked). Just don't join.

### Example D — A "great" real estate deal

Real estate agent: "I have a plot in Purbachal, will appreciate 30% in 18 months. 8 lakh down payment now, balance later. Guaranteed."

**Analysis:**
- 30% in 18 months = ~19% annualized
- Bangladesh real estate has historically returned roughly inflation + 3-5% = ~12-14% per year long-term
- 19% is high but not impossible — if it's in a developing area with strong infrastructure plans
- "Guaranteed" appreciation is a **lie** — no investment has guaranteed price changes
- Liquidity is poor — you can't easily exit
- Lots of legal documentation risks in Bangladesh real estate

**Verdict:** the *number* is plausible, but the "guarantee" is fiction. Real estate has volatility, fraud risk (fake titles, double-sold plots), and illiquidity. Investigate the agent, the project, RAJUK approval, title chain — or pass.

### Example E — Your own DPS at IBBL

IBBL Mudaraba DPS: ~10% nominal expected.

- Locate on spectrum: Tier 2 (very low risk — bank-backed, Shariah-compliant)
- Realistic for tier? Yes — 7-11% is typical for Tier 2
- Volatility? Essentially none
- Permanent loss risk? Very low (IBBL is a major bank)
- "Hidden" downsides? Lock-in period, early withdrawal penalty

**Verdict:** a perfectly honest, modest, real return investment. The numbers match the tier. No red flags. *This is what a legitimate investment looks like* — boring, modest, reliable. Compare to the "exciting" offers above and notice how dramatically different the marketing energy is. **Boring is good.**

---

## 4. Common mistakes

### Mistake 1: Equating high return with smart investing

People sometimes brag about a 60% gain on a stock they picked. What they don't share is the 7 other stocks they bought that lost money. **Net portfolio return is what matters, not the best winner.**

### Mistake 2: Being scared of all risk

The opposite extreme: someone learns about scams and decides "all investing is risky, I'll keep everything in cash." Now they lose 9% to inflation every year. **Some risk is necessary** to beat inflation. The skill is calibrating risk, not avoiding it.

### Mistake 3: Trusting people more than systems

"My uncle would never cheat me." Maybe not intentionally. But your uncle can also be wrong about his investment. People often invest based on relationship trust ("I trust him") when they should invest based on system trust ("I understand the underlying business / instrument / risk").

### Mistake 4: Thinking "I'll just try a small amount"

Many people get sucked in this way. "Just 5,000 to test it." Then it "works" (the early entrants of a Ponzi always get paid). Then they put in 50,000. Then 5 lakh. Then they tell relatives. Then it collapses. **If you wouldn't invest 5 lakh in it, don't invest 5,000 either** — the small-amount entry is the scam's recruitment mechanism.

### Mistake 5: Following loud people instead of evidence

A loud, confident person promoting an investment scheme is *more* suspicious, not less. Real long-term wealth-builders are usually quiet about it. The people shouting on social media about their "investment system" are almost always selling courses, recruiting downlines, or running schemes.

### Mistake 6: Believing past performance guarantees future returns

"This stock has gone up 30% per year for 3 years." That's information. It is **not** a prediction. Past performance is famously a weak predictor of future returns. Especially for individual stocks or small markets. Every prospectus literally has to say this in fine print — and everyone ignores it.

---

## 5. Try this today (the 40-minute exercise)

### Step A — The Red Flag Checklist (10 min)

Print this or write it in your tracker's Notes tab. Any of these = walk away:

**The 7 Red Flags**

1. ⚠️ **Returns above 20-25% per year claimed as "typical"** — almost certainly impossible or unsustainable
2. ⚠️ **The word "guaranteed" attached to any number above the Sanchaypatra rate** — guarantees at high returns don't exist
3. ⚠️ **Pressure to "join now" / "limited spots" / "act fast"** — legitimate investments don't run on FOMO
4. ⚠️ **You earn more by recruiting others than from the product itself** — classic pyramid
5. ⚠️ **The "product" is mostly the system / training / kit (not a real underlying asset or business)** — Ponzi/MLM signal
6. ⚠️ **You can't easily understand where the returns come from** — if you can't explain the source of profit, you don't know what you're invested in
7. ⚠️ **Returns are consistently positive month after month, with no down periods** — real investments have ups and downs. Steady-high-returns = fraud (Madoff's classic giveaway)

If any 1 of these is present → walk away. If 3+ are present → run.

### Step B — Audit "investments" you've been pitched (15 min)

Think back: in the last year, what financial opportunities have been pitched to you? List them.

For each, ask:
1. What tier of the spectrum?
2. What return was claimed?
3. Is the claimed return plausible for that tier?
4. How many red flags from the checklist?
5. Decision (in hindsight): join, decline, monitor?

Example format:

| Pitch | Tier | Claimed return | Plausible? | Red flags | Decision |
|---|---|---|---|---|---|
| Relative's MLM | T6 | 200%+/yr | No | 4-5 of 7 | Decline |
| IBBL DPS | T2 | 10%/yr | Yes | 0 | Join (in Stage 3) |
| Friend's business | T3 | 18%/yr | Yes | 0-1 (verify) | Maybe |

Write 3-5 examples in your tracker's Notes tab. Tag with `#day6-audit`.

### Step C — Build your "personal investment ladder" (10 min)

Based on the spectrum, what should YOUR investment ladder look like as you progress through stages?

| Stage | Tier | Examples | Approx % of monthly surplus to allocate here |
|---|---|---|---|
| Stage 3 (start) | T1-T2 | Mudaraba Savings, DPS, Sanchaypatra | 80-100% |
| Stage 3-4 | + T3 | DSE blue-chip halal stocks, sukuk | start adding 10-20% |
| Stage 4-5 | + T3 deeper | Diversified equity, international ETFs | adjust as comfort grows |
| Anywhere | NEVER | T5-T6 instruments | 0% — these aren't investments |

Write your own version. Adjust percentages based on your risk tolerance. *Crucially:* Tier 5-6 stays at 0% **forever**, regardless of stage. There's never a stage where forex trading becomes a good idea.

<script type="text/markdown" id="lesson-7"># Day 7 — Halal vs Haram Finance + Course Synthesis

Last day. You've built the conceptual foundation across 6 days. Today you add the Shariah lens — essential context if you intend to build wealth in a way consistent with Islamic principles — and then you synthesize everything into a unified framework you'll carry forward.

---

## 1. Why this matters

Two reasons today's lesson matters even if you're not deeply religious about money:

**Reason 1: Practical.** Many of the most attractive, stable, and accessible financial instruments in Bangladesh are Shariah-compliant — IBBL, Al-Arafah, EXIM, City Islami, First Security Islami, Social Islami, Standard Bank Islamic. To use them effectively, you need to understand what makes them different from conventional banks, what they're actually doing with your money, and how to evaluate whether a product is genuinely Shariah-compliant or just labeled as such.

**Reason 2: Strategic.** Bangladesh's Islamic finance industry is growing 10-15% annually. The global Islamic finance market is over $4 trillion and expanding. If your long-term ambitions include the income-side of Stage 4-5 (advisory, fintech products), Islamic finance literacy is a genuine career edge — especially in your specific cultural and linguistic context.

This lesson covers both the principles and the practical mechanics so you can evaluate any "Islamic" product critically — including spotting the ones that are halal in name only.

---

## 2. The concept

### The core prohibitions

Islamic finance is defined by what it forbids. Three things are core:

#### 1. Riba (সুদ) — Prohibition of interest

> **Riba** is any predetermined excess paid to a lender for the use of money, with no underlying productive risk-sharing.

The classical example: you lend 1,00,000 BDT to someone, and they agree to pay back 1,10,000 in a year. That extra 10,000 — paid simply for the passage of time, not because of any shared risk — is *riba al-nasi'a* (the most common form). It's prohibited in Islam.

The deeper logic: money by itself is not productive. It only becomes productive when combined with effort, risk, and a real economic activity. Earning a return just because you had money (no effort, no risk) violates the Islamic principle that wealth should flow from real productive activity.

**Modern examples of riba:**
- Conventional savings account interest (4% on your balance)
- Bank fixed deposit interest
- Credit card interest charges
- Conventional bond coupons
- Personal loan interest
- Mortgage interest

#### 2. Gharar (অতিরিক্ত অনিশ্চয়তা) — Excessive uncertainty

> **Gharar** is excessive ambiguity or uncertainty in a contract.

Some uncertainty in business is unavoidable and acceptable. But contracts where the terms, the goods, the price, or the outcome are deeply unclear are forbidden.

**Modern examples of gharar:**
- Conventional insurance (premium pays for an uncertain future event, structured as a one-sided transfer)
- Forex speculation (you're not trading real goods, just betting on price moves)
- Most derivatives, futures, and options
- Gambling in any form
- Lottery tickets

#### 3. Maysir (জুয়া) — Gambling / pure speculation

> **Maysir** is gain achieved purely by chance, without productive economic activity.

Closely related to gharar but specifically about chance-based gain.

**Modern examples of maysir:**
- Casino games
- Lottery
- Day trading where you're not analyzing fundamentals, just betting on short-term moves
- Cryptocurrency trading (controversial — some scholars say crypto itself is haram due to gharar/maysir, others say it depends on use case)

### Additional prohibitions

- **Investment in haram industries**: alcohol, pork, gambling, conventional banking/insurance, weapons, adult entertainment, etc.
- **Riba al-fadl**: unequal exchange of like-for-like commodities (technical; less relevant for personal finance)

---

### Halal alternatives — how Islamic finance works

The core innovation: instead of lending at interest, Islamic finance uses **partnership and trade structures** where the lender shares both profit and loss.

#### Mudaraba — Profit-sharing partnership

> One party provides capital (*rab-al-mal*), the other provides effort/expertise (*mudarib*). They agree to share *profit* by a ratio (e.g., 60/40). Losses are borne entirely by the capital provider; the worker loses their time and effort.

**Modern application:** Islamic banks like IBBL operate Mudaraba savings/term deposit accounts. You (depositor) are the capital provider. The bank is the mudarib. The bank invests your money in halal businesses, and you share in the profits — not at a guaranteed rate, but as a share of actual returns. The rate is *expected* but not contractually guaranteed (which is what makes it halal).

#### Musharaka — Joint partnership

> Both parties contribute capital AND share in the management. Profits shared by agreed ratio, losses shared in proportion to capital contribution.

**Modern application:** used for business partnerships, home financing (where the bank and you co-own a property), and joint ventures. The bank doesn't "lend" you money to buy a house — it *buys* part of the house with you, then you gradually buy out its share.

#### Sukuk — Islamic "bonds"

> Sukuk are certificates of *ownership* in real assets or productive ventures. You own a piece of something tangible, and you receive a share of the rent / profit it generates.

**Difference from conventional bonds:** a conventional bond is a loan with interest. A sukuk is fractional ownership of a productive asset. You're entitled to the asset's returns, but you also bear its risk.

**Modern application:** Bangladesh has issued sovereign sukuk. Many Islamic banks offer sukuk-based investment products. Globally, sukuk market is hundreds of billions of dollars.

#### Murabaha — Cost-plus sale

> The bank buys an asset you want, then sells it to you at a marked-up price, payable in installments. Critically: it's a *sale*, not a loan.

**Modern application:** Islamic auto financing — the bank actually buys the car, then sells it to you at a higher fixed price you pay in monthly installments. No interest, just a marked-up sale.

**Critical question:** is this *really* different from a conventional loan? Scholars debate. The form is different (sale vs lending), the substance often resembles interest. Most major scholars accept it as halal *if* the bank takes actual ownership for at least a moment and bears the asset's risk during that time.

#### Ijara — Leasing

> The bank buys an asset and leases it to you. Like a long-term rental. You make payments, and at the end you may or may not own the asset (depending on the contract type).

**Modern application:** equipment financing, vehicle leasing, sometimes home financing (Ijara Muntahia Bittamlik = lease ending in ownership).

#### Wadiah — Safekeeping

> Pure deposit with no return guaranteed. You give the bank money for safekeeping; they may use it but owe you the full amount back on demand. Any "gift" (hibah) from the bank to depositors is at the bank's discretion, not contractual.

**Modern application:** some basic Islamic checking accounts.

### How to evaluate "Is this product really halal?"

Many products are *labeled* Islamic without being substantively different from conventional ones. To check:

1. **What's the underlying contract?** Mudaraba, musharaka, murabaha, ijara, sukuk — these are the legitimate structures. If the brochure doesn't say which one, ask.

2. **Is there a Shariah board overseeing it?** Reputable Islamic banks have Shariah Supervisory Boards of qualified scholars. If a product isn't under such oversight, be cautious.

3. **Is the return guaranteed or expected?** A *guaranteed* fixed return on a deposit is structurally riba. An *expected* return (with the disclaimer that it depends on actual underlying business performance) is halal.

4. **Who bears the risk?** In legitimate Islamic finance, the capital provider bears risk. If a product promises capital protection AND a fixed return — it's mimicking conventional interest, which scholars disagree about.

5. **What does the underlying activity look like?** Mudaraba savings are halal because the bank invests in halal businesses. Sukuk are halal because they're tied to real productive assets. If you can't identify the underlying real economic activity, be cautious.

6. **AAOIFI compliance.** AAOIFI (Accounting and Auditing Organization for Islamic Financial Institutions) sets the standards. Products certified AAOIFI-compliant have rigorous oversight. This is the gold standard in Islamic finance.

---

### Areas of ongoing scholarly debate

Not everything is settled. Educated Muslims often disagree on:

- **Conventional bank stocks** — some scholars allow buying stocks of conventional banks if revenue from interest is below a threshold (often 5%); others say no
- **Cryptocurrency** — some scholars say haram (excessive gharar, no real underlying asset); others say it can be halal depending on use case
- **Stock market participation generally** — most accept buying shares of halal businesses; some are stricter on screening
- **Insurance** — conventional insurance is broadly considered haram; Takaful (Islamic mutual insurance, where participants pool funds to help each other) is the halal alternative, but Takaful options in Bangladesh are still developing

When in doubt, consult a qualified scholar or stick to the most conservative position until you have more information. **"I'm not sure" is a valid reason to pass on a financial product.**

## 3. Worked examples

### Example A — IBBL Mudaraba Savings Account

You deposit 10,000 BDT.

**Conventional bank:** They guarantee 4% per year. You get 400 BDT regardless of bank performance. **Structurally:** lending at interest → riba.

**IBBL Mudaraba:** They expect ~6% per year, but it's a *profit share*. The bank invests your money (and others') in halal businesses. At year-end, they calculate actual profit, give you your share. In a great year, maybe you earn 7%. In a bad year, maybe 5% or less. **Structurally:** partnership in business → halal.

**The catch:** in practice, IBBL's Mudaraba rates have been very stable, mimicking conventional deposits. Some scholars worry this is "halal in form, conventional in substance." But the *contract* is legitimate, and the bank does have a Shariah board. Most scholars accept it.

### Example B — A "Forex Trading is Halal" claim

Someone says: "Forex trading is halal because I'm trading real currencies."

**Analysis:**
- Spot forex (immediate physical exchange of currencies) → generally halal
- Leveraged retail forex trading (margin trading, holding positions overnight with swap fees) → almost universally considered haram due to:
  - **Riba** (overnight swap fees are interest)
  - **Gharar** (excessive uncertainty, high leverage)
  - **Maysir** (pure speculation on short-term moves)

**Verdict:** the "I'm trading real currencies" defense doesn't hold up. Modern retail forex trading is haram by nearly all mainstream scholars. Add to that: it's also illegal in Bangladesh and a financial loss-maker for 90%+ of retail traders (from Day 6). Triple reason to avoid.

### Example C — "Islamic" credit card

A bank advertises an "Islamic credit card."

**How can it possibly be halal?** Conventional credit cards charge interest on unpaid balances — clear riba.

**The Islamic version** typically works on Murabaha or Ujrah (fee-based):
- You make purchases, the bank pays the merchant
- You owe the bank the amount
- If you pay on time → no extra charge
- If you pay late → a fee (not interest, structured as a penalty / administrative charge)

**Critical question:** is the "late fee" really different from interest? Scholars debate. Some argue if the late fee accrues regularly and proportionally to the unpaid amount, it's interest in disguise. Others accept it if it's a flat fee.

**Practical guidance:** if you're going to use a credit card at all, an "Islamic" version is probably better than a conventional one. But even better: don't carry credit card balances at all. The structural debate disappears if you pay in full every month.

### Example D — Sanchaypatra (Bangladesh government savings certificate)

5-Year Bangladesh Sanchaypatra. Pays ~11% per year.

**Is this halal?**

This is contested. The government pays a fixed predetermined return — which structurally looks like interest. Some scholars consider it haram for this reason.

Others argue that:
- It's a sovereign financial instrument
- The "interest" is partly a subsidy / welfare mechanism
- It's permissible under certain interpretations of dar-ul-harb / dar-ul-Islam frameworks (though Bangladesh doesn't strictly fit either)

**Common practical position:** many Bangladeshi Muslims do use Sanchaypatra. Others prefer to stick strictly to Mudaraba-based products. If you want to be strictly conservative, use IBBL/Al-Arafah Mudaraba Term Deposits instead.

**No definitive answer here.** This is a case where you should consult a scholar you trust. The course's role is to make you aware of the question, not to answer it for you.

### Example E — DSE blue-chip stocks

You want to buy 1,000 BDT of Square Pharma stock.

**Halal screening:**
1. Is Square Pharma's primary business halal? → Yes (pharmaceuticals)
2. Does it have significant haram revenue streams? → Need to check (interest from cash holdings, etc.)
3. Is its debt/asset ratio acceptable? → Common screen: total interest-bearing debt < 33% of total assets

For most major DSE blue-chips, these screens pass with the standard AAOIFI / Dow Jones Islamic Market screening. You can find Shariah-compliance lists from local Islamic finance advisors.

**Verdict:** likely halal. Worth confirming through formal screening before significant investment.

## 4. Common mistakes

### Mistake 1: Assuming all Islamic banks are equally Shariah-compliant

Not all Islamic banks have equally rigorous Shariah boards or oversight. Some have stricter implementations than others. Do basic due diligence.

### Mistake 2: Treating "Islamic" as a marketing label

A product labeled "Islamic" isn't automatically halal. Always ask about the underlying contract structure.

### Mistake 3: Ignoring halal options assuming they're worse

Many Muslims default to conventional banks because "it's easier" — but Islamic alternatives in Bangladesh are mature and comparable. The slight differences in rates / convenience are often worth it for the peace of mind.

### Mistake 4: Being so strict you never invest

The flip side: some people find every halal product to have *some* scholarly debate, so they never invest at all. They keep money in cash, lose 9% to inflation, and stay poor. **Following a mainstream-acceptable position is better than paralysis.** Pick a position you can justify, and proceed.

### Mistake 5: Mixing your conventional and Islamic accounts casually

If you maintain both for any reason (work salary at a conventional bank, etc.), be intentional. Most scholars suggest: receive salary in conventional bank if required, but accumulate / invest savings through Islamic channels.

### Mistake 6: Forgetting that Islamic finance has the same risk-return tradeoffs

Halal doesn't mean risk-free. A Mudaraba account can have a low-profit year. A halal stock can decline. A sukuk issuer can default. Apply Day 6's risk-return framework to halal options too. Don't assume "Islamic = safe."

## 5. The Course Synthesis

Seven days. Ten concepts. Let me tie them together so you have one mental model going forward.

### The unified framework

Every financial decision you'll ever make can be evaluated by these questions:

1. **What's my cash flow direction?** (Day 1) — am I building surplus or draining?
2. **What's my net worth doing over time?** (Day 1) — moving toward positive or negative?
3. **Am I letting compounding work for or against me?** (Day 2) — savings/investments compound up, debts compound up too
4. **What's the real return after inflation?** (Day 3) — nominal numbers lie
5. **What's this thing worth in present terms?** (Day 4) — discount future to today
6. **Am I accumulating assets or liabilities?** (Day 5) — the simple cash-flow test
7. **Am I converting income to wealth or burning it?** (Day 5) — flow vs stock
8. **What's the risk-return tier? Plausible for that tier?** (Day 6) — scam filter
9. **Is the structure halal — not just the label?** (Day 7) — Shariah lens

That's the framework. Nine questions. Apply them to anything that involves money. You will be ahead of 95% of people who never run any of these checks.

### The order of operations (your decade-long plan)

1. **Today through Month 2:** Stage 0 — master the 10 concepts (this course is the first half of that)
2. **Month 2-3:** Stage 1 — practice tracking; see your real numbers
3. **Month 3-9:** Stage 2 — grow income through skill leverage (Day 8 file is the deep-dive)
4. **Month 6-18:** Stage 3 — small investing experiments (DPS, Sanchaypatra, observed DSE)
5. **Year 2:** Stage 4 — deeper financial knowledge (financial statements, valuation, halal advanced)
6. **Year 3+:** Stage 5 — wealth compounds. Debt is mostly cleared as side-effect.

You're not racing. You're walking — but in the right direction. Time + discipline + correct concepts = wealth, almost mechanically.

  // Tables — must be processed before paragraph splitting
  s = s.replace(/((?:^\|.+\|\n?){1,})\|[-:\s|]+\|\n((?:^\|.+\|\n?)+)/gm, (match, header, body) => {
    const headerCells = header.trim().split('|').slice(1, -1).map(c => c.trim());
    const rows = body.trim().split('\n').map(line => line.split('|').slice(1, -1).map(c => c.trim()));
    return `<table><thead><tr>${headerCells.map(h => `<th>${inline(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${inline(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  });

  const lines = s.split('\n');
  let out = '', inList = null, paraBuf = [];
  const flushPara = () => {
    if (paraBuf.length) {
      const text = paraBuf.join(' ').trim();
      if (text) out += `<p>${inline(text)}</p>`;
      paraBuf = [];
    }
  };
  const closeList = () => {
    if (inList) { out += inList === 'ul' ? '</ul>' : '</ol>'; inList = null; }
  };

  for (let i = 0; i < lines.length; i++) {
    const L = lines[i];

    // Code-block placeholder
    if (/␀CODE\d+␀/.test(L)) {
      flushPara(); closeList();
      out += L.replace(/␀CODE(\d+)␀/g, (m, idx) => codeBlocks[+idx]);
      continue;
    }

    // Pre-rendered table
    if (/^<table/.test(L)) {
      flushPara(); closeList();
      out += L; continue;
    }

    // Headers
    const hm = L.match(/^(#{1,6}) (.*)/);
    if (hm) { flushPara(); closeList(); out += `<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>`; continue; }

    // Horizontal rule
    if (/^---+\s*$/.test(L)) { flushPara(); closeList(); out += '<hr>'; continue; }

    // Blockquote
    if (/^> /.test(L)) {
      flushPara(); closeList();
      let q = [L.replace(/^> /, '')];
      while (i + 1 < lines.length && /^> /.test(lines[i + 1])) { q.push(lines[++i].replace(/^> /, '')); }
      out += `<blockquote>${inline(q.join(' '))}</blockquote>`;
      continue;
    }

    // Lists — unordered (- * +) and "task list" with [ ] / [x]
    const ulMatch = L.match(/^([-*+]) (.*)/);
    if (ulMatch) {
      flushPara();
      if (inList !== 'ul') { closeList(); out += '<ul>'; inList = 'ul'; }
      let item = ulMatch[2];
      item = item.replace(/^\[([ x])\] /, (m, c) => c === 'x' ? '☑ ' : '☐ ');
      out += `<li>${inline(item)}</li>`;
      continue;
    }
    const olMatch = L.match(/^\d+\. (.*)/);
    if (olMatch) {
      flushPara();
      if (inList !== 'ol') { closeList(); out += '<ol>'; inList = 'ol'; }
      out += `<li>${inline(olMatch[1])}</li>`;
      continue;
    }

    // Blank line
    if (L.trim() === '') { flushPara(); closeList(); continue; }

    paraBuf.push(L);
  }
  flushPara(); closeList();

  // Replace code-block placeholders in remaining text
  out = out.replace(/␀CODE(\d+)␀/g, (m, idx) => codeBlocks[+idx]);
  return out;
}
function inline(s) {
  if (!s) return '';
  return s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ====== Keyboard ======
document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea, select')) return;
  if (!currentLessonId) return;
  const idx = findIndex(currentLessonId);
  if (e.key === 'ArrowRight' || e.key === 'j') {
    if (idx < LESSONS.length - 1) openLesson(LESSONS[idx + 1].id);
  } else if (e.key === 'ArrowLeft' || e.key === 'k') {
    if (idx > 0) openLesson(LESSONS[idx - 1].id);
  } else if (e.key === 'x' || e.key === ' ') {
    e.preventDefault();
    toggleComplete(currentLessonId);
  }
});

// ====== Init ======
renderSidebar();
if (state.last) openLesson(state.last);
else showWelcome();
</script>
