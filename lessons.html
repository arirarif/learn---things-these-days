<script type="text/markdown" id="lesson-00"># The 7-Day Foundation Course

Welcome. This is a **self-contained finance course** — actual lessons, not a list of books to go read. Over 7 days you'll internalize the 10 foundational concepts that make every other money decision in your life make sense.

## How this course is different

Most "personal finance" content does one of two things:
1. **Tells you what to do** ("save 20%", "invest in index funds") without explaining *why* — so the moment your situation differs, the advice breaks
2. **Throws book recommendations at you** ("read Psychology of Money") — which is fine, but takes weeks and you can't tell if you actually learned anything

This course does the third thing: **teaches you the underlying concepts** in your own language with your own numbers, so you can build correct advice for yourself. After 7 days you won't be a finance expert, but you'll be able to spot bad advice when you see it.

## Daily structure (each lesson is ~45 minutes)

Each day's lesson has this same structure so you know what to expect:

1. **Why this matters** (3 min) — the hook, the one thing this concept changes in your life
2. **The concept** (10–15 min) — careful explanation in plain English with Bengali terms
3. **Worked example** (10 min) — math you can follow, real Bangladesh numbers
4. **Common mistakes** (5 min) — what people get wrong, and why
5. **Try this today** (10 min) — a real exercise, not theoretical
6. **Reflection prompt** (5 min) — questions to write about in the tracker's Notes tab
7. **Companion content** — one specific video or article to watch *after* the lesson (optional)
8. **Self-check** — 5 questions you should now be able to answer

If a section feels obvious, skip it. If a section feels hard, slow down. Total time per day: 30–60 minutes depending on you.

## The 7-day schedule

| Day | Lesson | Concept(s) |
|---|---|---|
| 1 | **Cash Flow + Net Worth** | The two numbers that define your finances |
| 2 | **Compound Interest** | The most powerful force in money (working both for and against you) |
| 3 | **Inflation + Real Return** | Why money sitting still actually shrinks |
| 4 | **Time Value of Money** | Why a taka today ≠ a taka tomorrow |
| 5 | **Assets vs Liabilities + Income vs Wealth** | What you should be accumulating (most people get this wrong) |
| 6 | **Risk vs Return** | How to evaluate any investment and spot scams |
| 7 | **Halal vs Haram Finance + Synthesis** | Shariah-compliant money + tying the whole course together |

## How to take this course

**Pace:** one lesson per day, 7 days in a row. Don't binge two on the same day — give your brain a night to consolidate each one.

**Time:** ideally morning before work, or evening before bed. Not while multitasking.

**Place:** somewhere quiet. Phone on silent. This is study, not entertainment.

**Tools you'll need:**
- This lesson file (read on phone or computer)
- The `tracker.html` open in another tab — for the Notes tab and Concepts tab
- A pen and paper for the math exercises (writing helps you absorb)
- A calculator (your phone is fine)

**After each lesson:**
1. Mark the concept as "Learning" or "Mastered" in the tracker's **Concepts** tab
2. Write your reflection in the **Notes** tab (use `#day1`, `#day2`, etc. tags)
3. Add the lesson to the **Study Log** tab as "Done"

## What this course does NOT do

- ❌ Tell you exactly what to invest in (that's later, when you're ready)
- ❌ Give you a debt-payoff plan (that's a different problem)
- ❌ Promise you'll be rich (anyone who promises that is lying)
- ❌ Cover advanced topics (valuation, M&A, options — those come at Stage 4+)

What it **does** do: make you literate enough that the rest of your financial life starts making sense, decisions become clearer, and scams become obvious.

## Before you start Day 1

Take 2 minutes now:
- Open `tracker.html` in a browser
- Go to the **Concepts** tab — see the 10 concepts listed
- Go to the **Study Log** tab — add "7-Day Foundation Course" as a Book/Course, status "In progress"
- Set yourself a calendar reminder for tomorrow at the same time you're reading this

Now go to `Day-1.md`. Start.

## A note on language

The course is in English because that's what you asked for. All the math, examples, and Bangladesh context are still here — the language is the only thing that's English. If a sentence is unclear, re-read it slowly or look up one word at a time. The act of looking up words is itself learning.

Bengali terms for key concepts are included in parentheses so you can connect English finance vocabulary to the Bengali you already think in.

---

> **"You don't learn finance from articles. You learn it by sitting with one idea long enough that it becomes part of how you see the world. This course is 7 sittings."**

<script type="text/markdown" id="lesson-1"># Day 1 — Cash Flow + Net Worth

The two numbers that define your entire financial life. Everyone has them whether they know them or not. After today, you will know yours.

---

## 1. Why this matters

Imagine two people:

**Person A** earns 50,000 BDT/month. Spends 35,000. Has 15,000 left over every month.

**Person B** earns 1,50,000 BDT/month. Spends 1,55,000. Borrows 5,000 every month to fill the gap.

Person B earns three times more. Person B is also going broke. Person A, on a "small" income, is building wealth — slowly, but in the right direction.

**The difference is cash flow.** It is the single most important number in personal finance, and almost no one calculates it for themselves.

Now imagine 10 years later:

- **Person A** has 15,000 × 12 × 10 = 18,00,000 BDT accumulated (and that's without any investment returns)
- **Person B** has 5,000 × 12 × 10 = 6,00,000 BDT in *debt*, plus interest, plus the daily stress of always being short

The income difference didn't matter. The cash flow direction did.

**That's Day 1.** Understand cash flow, and you understand 80% of why some people end up wealthy and others don't — regardless of what they earn.

The second concept today, **net worth**, is the *accumulated result* of your cash flow direction over time. They are two views of the same thing: cash flow is the verb, net worth is the noun.

---

## 2. The concept

### Cash flow (নগদ প্রবাহ)

**Definition:**
> Cash flow = Money coming in − Money going out, measured over a period (usually one month).

**Three possible states:**
- **Positive cash flow:** Income > Expenses. You have surplus. This is where wealth-building begins.
- **Negative cash flow:** Expenses > Income. You're losing ground. The longer this continues, the deeper the hole.
- **Zero cash flow:** Income = Expenses. You're treading water. Not drowning, but not swimming either.

**Critical insight:** cash flow is a *flow* — like water through a pipe. It's measured per unit of time. Most people make the mistake of thinking about money as a *stock* ("I have X taka") instead of a *flow* ("I move X taka per month"). The flow is what determines your trajectory.

### Net worth (মোট সম্পদ)

**Definition:**
> Net worth = (Everything you own) − (Everything you owe)
> Net worth = Total Assets − Total Liabilities

**Assets** are anything that has financial value: cash, bank balances, savings deposits, investments (DPS, stocks, Sanchaypatra), property, gold, valuable equipment.

**Liabilities** are anything you owe: credit card balance, personal loan, mortgage, money borrowed from family, market loans.

**Net worth can be:**
- **Positive** — you own more than you owe
- **Negative** — you owe more than you own (this is most people in their 20s and 30s, completely normal)
- **Zero** — exactly balanced (rare)

**Critical insight:** net worth is a *stock* (a snapshot at one moment), not a flow. It tells you where you stand today. Cash flow tells you which direction you're moving.

### How they connect

If your cash flow is positive every month, your net worth slowly rises over time. If it's negative, your net worth slowly falls.

**The relationship over 12 months:**
> Net worth (end of year) ≈ Net worth (start of year) + (Monthly cash flow × 12) + Investment returns − Inflation effects

This is the formula your whole financial life runs on. If you only ever learn one equation, learn this one.

---

## 3. Worked example

Let's compute cash flow and net worth for a hypothetical Bangladeshi freelancer — similar to your situation.

### Monthly income (last month, in BDT)

| Source | Amount |
|---|---|
| Client A (Upwork) | 35,000 |
| Client B (direct, USD payment converted) | 28,000 |
| Client C (small one-off) | 7,000 |
| **Total inflow** | **70,000** |

### Monthly expenses (last month, in BDT)

| Category | Amount |
|---|---|
| Rent | 15,000 |
| Food (groceries) | 12,000 |
| Food (eating out) | 3,500 |
| Kid (school, milk, doctor visits) | 8,000 |
| Utilities (gas, electric, water) | 2,500 |
| Internet + Mobile | 2,000 |
| Transport | 3,000 |
| Personal (clothing, tea, misc) | 4,500 |
| Medical | 1,500 |
| Loan EMI payments (total of 4) | 14,000 |
| Subscriptions (Netflix, etc.) | 1,000 |
| Other | 3,000 |
| **Total outflow** | **70,000** |

### Monthly cash flow

> Cash flow = 70,000 − 70,000 = **0 BDT**

Zero. Not negative, but not positive either. Every taka earned is spent. **This is exactly why no savings have formed.** There is no surplus to save.

### Now compute net worth (snapshot today)

**Assets:**
| Item | Value |
|---|---|
| Cash on hand | 2,000 |
| Bank savings | 4,500 |
| DPS / FDR / Sanchaypatra | 0 |
| Stocks (DSE) | 0 |
| Phone, laptop, other equipment (current resale) | 35,000 |
| **Total assets** | **41,500** |

**Liabilities:**
| Item | Value |
|---|---|
| Credit card balance | 90,000 |
| Personal loan outstanding | 2,80,000 |
| Family loan | 1,40,000 |
| Market / chit fund loan | 1,90,000 |
| **Total liabilities** | **7,00,000** |

**Net worth:**
> Net worth = 41,500 − 7,00,000 = **−6,58,500 BDT**

This is the starting line. **Uncomfortable, but useful.** You cannot fix what you refuse to look at. Now this number can move.

### What happens with 5,000/month positive cash flow?

Suppose you bring cash flow from 0 to +5,000/month (by raising one client's rate, or cutting subscriptions). In 12 months, assuming you put it all toward debt:

- Total debt paid down: 60,000 BDT (ignoring interest for simplicity)
- New net worth: 41,500 − 6,40,000 = **−5,98,500 BDT**

You've moved 60,000 BDT in the right direction in a single year, on a tiny 5,000/month change. **That's the entire game.** Cash flow direction × time = net worth movement.

---

## 4. Common mistakes

### Mistake 1: Confusing income with cash flow

People say "I earn X, I'm doing fine" — but income alone is meaningless. A doctor earning 5 lakh/month spending 5 lakh has the same cash flow as a teacher earning 0. Only the *difference* matters.

### Mistake 2: Treating one good month as the new normal

If you have one 90,000 BDT month, you might mentally think "I earn 90k/month." But if the average across the year is 70k, your *real* income is 70k. Average across a long window. Freelance income especially deceives this way.

### Mistake 3: Forgetting irregular expenses

The "monthly" expense list usually misses things that hit a few times a year: medical emergencies, festival expenses, kid's school admission, equipment replacement, family events. Take your *annual* total of these surprises and divide by 12 — add that as a "buffer" line. Most people undercount expenses by 10–15% by forgetting this.

### Mistake 4: Mixing assets and income

Your laptop is an asset (one-time stock of value). The freelance work it enables is income (flow). The two are easy to confuse. Your phone isn't "your savings" — it's an asset that depreciates and probably has near-zero resale value in 3 years.

### Mistake 5: Counting borrowed money as cash flow

If you borrow 50,000 from a friend this month, you do *not* have positive cash flow of 50,000. You have +50,000 in cash (asset) and +50,000 in debt (liability) — net zero. Don't let cash from borrowing fool you.

### Mistake 6: Ignoring lifestyle inflation

When income rises, expenses tend to rise with it ("now I can afford..."). The way wealthy people build wealth is by **keeping expenses constant when income rises** — so cash flow goes up. The way most people stay middle-class is by raising expenses to match income.

---

## 5. Try this today (the 30-minute exercise)

Open the `tracker.html` dashboard. We'll fill it in with *your* numbers.

### Step A — Income (5 min)

Look at your last 3 months of income. Open your bank/bKash/Nagad statements, freelance platform dashboards, anywhere money came in.

For each month, add up everything. Take the **average** across the 3 months. Don't use your "best month" — use the average. That's your honest monthly income.

> Write it down here: "My average monthly income is _________ BDT"

### Step B — Expenses (15 min)

This is harder. You won't have perfect numbers — that's fine. Estimate.

Go through this list and put a rough number against each (your last typical month):

| Category | BDT |
|---|---|
| Rent | |
| Food (groceries) | |
| Food (eating out / delivery) | |
| Kid | |
| Utilities | |
| Internet + Mobile | |
| Transport | |
| Personal | |
| Medical | |
| All EMIs combined | |
| Subscriptions | |
| Festival / family / surprises (annual ÷ 12) | |
| Other | |
| **TOTAL** | |

Add it up. If you don't know a number, guess and write a `?` next to it. This is your first pass. Tracking in the Expenses tab will refine it next month.

### Step C — Compute monthly cash flow

> Monthly cash flow = Income − Expenses = _________ BDT

If positive: by how much? If negative: by how much? If zero: that's why nothing accumulates.

### Step D — Compute net worth

- Cash + bKash + Nagad: _____
- Bank savings: _____

- Investments / stocks: _____
- Equipment resale value (laptop, phone, etc.): _____
- Anything else of real value: _____
- **Total assets:** _____

**Liabilities** (BDT):
- Credit card balance: _____
- Personal loan outstanding: _____
- Family/informal loans: _____
- Market/chit fund: _____
- **Total liabilities:** _____

**Net worth = Assets − Liabilities = _________ BDT**

It will probably be negative. That's the starting line. Now you have a number that can change.

<script type="text/markdown" id="lesson-2"># Day 2 — Compound Interest

If you only mastered one concept in this entire course, this would be the one. Albert Einstein supposedly called compound interest "the most powerful force in the universe." Whether or not he actually said that, the math is unmistakable. By the end of today, you will understand why.

---

## 1. Why this matters

Two stories, same person, two universes.

**Universe A:** A 30-year-old in Dhaka deposits 2,000 BDT/month into a Shariah-compliant DPS that earns ~10% per year. He never increases the amount. Just 2,000 every month, on autopilot, for 30 years until he's 60.

At age 60, he has approximately **₹45,40,000 BDT** (about 45 lakh).

He deposited a total of 2,000 × 12 × 30 = **7,20,000 BDT** (about 7 lakh).

The other 38 lakh? Pure compound interest. Money he didn't earn — the system earned it for him.

**Universe B:** Same person, same age 30, takes 50,000 BDT on a credit card at 30% APR for a phone he didn't really need. He pays only the minimum each month (~5% of balance). He never adds more debt — just leaves that one 50,000 sitting there at 30%.

At age 60 — same 30 years — that one 50,000 he never paid off has cost him approximately **₹15,00,000 BDT** in interest. That's 15 *lakh* of his life, gone, for one impulse phone purchase that he probably forgot about by month 3.

Same force. Working for you in Universe A. Working against you in Universe B.

The single biggest factor separating wealthy people from broke people is whether compound interest is on their side or working against them.

---

## 2. The concept

### Simple interest vs compound interest

**Simple interest** is interest calculated only on the original amount.
- Borrow 1,000 BDT at 10% per year for 3 years.
- Each year you owe 100 BDT interest.
- After 3 years: 1,000 + 100 + 100 + 100 = **1,300 BDT total.**

**Compound interest** is interest calculated on the original amount *plus all previously accumulated interest*. Interest earning interest. The previous year's interest joins the principal next year, and starts earning its own interest.

- Borrow 1,000 BDT at 10% per year compounded annually for 3 years.
- Year 1: 1,000 × 1.10 = 1,100
- Year 2: 1,100 × 1.10 = 1,210
- Year 3: 1,210 × 1.10 = **1,331 BDT**

Difference is small (31 BDT) at 3 years. Now run it for 30 years.

**At 30 years on a 1,000 starting amount, 10% annual:**
- Simple interest: 1,000 + (100 × 30) = 4,000 BDT
- Compound interest: 1,000 × (1.10)³⁰ = **17,449 BDT**

The compound version is **more than 4 times the simple version**. That gap is what we mean by "compounding." It grows exponentially.

### The compound interest formula

> **A = P × (1 + r)ⁿ**

Where:
- **A** = final amount
- **P** = starting principal (what you started with)
- **r** = interest rate per period (as a decimal, e.g., 10% = 0.10)
- **n** = number of periods

You don't need to memorize this. Just understand: every period you multiply by (1 + r). After many periods, that small `(1 + r)` becomes enormous.

For monthly compounding (most realistic for DPS, credit cards, etc.):

> **A = P × (1 + r/12)^(12n)**

For 10% annual rate, monthly compounding, you multiply by (1 + 0.10/12) = 1.00833 every month. Doesn't sound like much. Run it 360 times (30 years × 12 months) and you get... a lot.

### The three variables that matter

Compound interest has three inputs. Each has a different effect:

1. **Principal (P)** — how much you start with. Linear effect. Double the starting amount, double the result.
2. **Rate (r)** — what % per period. Exponential effect on time. 1% extra compounded over decades is enormous.
3. **Time (n)** — how many periods. The most powerful variable. Doubling the time often more than doubles the result.

**The most underappreciated insight in personal finance:**

> *Time matters more than rate. Time matters more than amount.*

Someone who starts with 1,000 BDT/month at age 25 will usually end up wealthier at 65 than someone who starts with 3,000 BDT/month at age 40. The early start beats the larger contribution. Not by a little — by a lot.

---

## 3. The Rule of 72

There's a beautiful mental shortcut for compound interest. You don't need a calculator. Just memorize this:

> **Rule of 72:** Divide 72 by the annual interest rate (as a whole number) to find how many years it takes for money to double.

Examples:
- At **6%** per year, money doubles in 72 ÷ 6 = **12 years**
- At **8%** per year, money doubles in 72 ÷ 8 = **9 years**
- At **10%** per year, money doubles in 72 ÷ 10 = **7.2 years**
- At **12%** per year, money doubles in 72 ÷ 12 = **6 years**
- At **24%** (credit card) per year, money doubles in 72 ÷ 24 = **3 years**
- At **36%** (high credit card) per year, doubles in 72 ÷ 36 = **2 years**
- At **60%** (chit-fund) per year, doubles in 72 ÷ 60 = **1.2 years**

Use this to sanity-check things in real life:
- If someone offers "your money doubles in 4 years," that's 72/4 = 18% per year. Plausible (high but possible).
- If someone offers "your money doubles in 1 year," that's 72/1 = 72% per year. Almost certainly a scam or a Ponzi.
- If a credit card charges 30%, your unpaid balance roughly doubles every 2.4 years. After 5 years it's 4x; after 10 years it's 16x.

**Try this:** without a calculator, how long does 5,00,000 BDT take to become 10,00,000 at 9% per year?
> 72 ÷ 9 = 8 years. That's it.

---

## 4. Worked examples

### Example A — The savings story (compounding FOR you)

You decide to put 2,000 BDT/month into a DPS at IBBL earning ~10% per year compounded monthly, for 30 years.

Total you deposit: 2,000 × 12 × 30 = 7,20,000 BDT
Final amount: approximately **45,40,000 BDT**

| Year | Balance (approx) |
|---|---|
| 0 | 0 |
| 5 | 1,55,000 |
| 10 | 4,12,000 |
| 15 | 8,29,000 |
| 20 | 15,18,000 |
| 25 | 26,46,000 |
| 30 | **45,40,000** |

Look at the curve. In the first 10 years, you accumulate about 4 lakh. In the *last* 10 years (years 20–30), you accumulate about **30 lakh**. The same monthly deposit. The same rate. **Time did the work.**

This is why starting early is everything.

### Example B — The debt story (compounding AGAINST you)

You take 50,000 BDT on a credit card at 30% APR. You make only the minimum payment each month (≈3% of balance). You don't add new debt — just leave that one 50k sitting.

How much you end up paying over 30 years (in just interest, not even principal that hasn't been touched yet):

> Total interest = approximately **15,00,000 BDT**

That's 30x the original 50,000. For a phone or a watch you bought once and forgot about.

This is why high-interest debt is described as "financial cancer." It grows silently, in the background, and the longer it sits, the more it eats.

### Example C — The dangerous one (chit fund)

You owe 1,00,000 BDT to a market lender at 5% per month (60% APR).

If you only pay 5,000 BDT per month — exactly the monthly interest — the principal **never moves**. After 5 years, you've paid 3,00,000 BDT total and you still owe 1,00,000.

If you pay less than 5,000 per month — say 4,000 — the principal grows. After 5 years, it has *increased* to approximately 1,80,000 BDT, and you've already paid 2,40,000 in payments.

**This is why the chit-fund loan is the most dangerous on your debt list, and why even at Stage 0–1 you need to make sure interest is at least covered.**

It's not about "let me ignore it" — it's about "let me at least stop the principal from growing."

### Example D — Time vs amount

Person A: starts saving at age 25. Puts 1,000 BDT/month for 10 years (until 35). Then stops. Never adds another taka. Lets it sit until age 65 at 10% per year.

Total deposited: 1,000 × 12 × 10 = 1,20,000 BDT.
Final value at 65: approximately **22,80,000 BDT**.

Person B: starts saving at age 35. Puts 1,000 BDT/month for 30 years (until 65). Continuously.

Total deposited: 1,000 × 12 × 30 = 3,60,000 BDT.
Final value at 65: approximately **22,60,000 BDT**.

**Person A deposited 3× less and ended up with more.** Because Person A's money compounded for 40 years, Person B's compounded for an average of 15.

> **The lesson: starting early beats saving more. Time is the leverage no amount of cleverness can replicate.**

You're not at age 25 anymore. But you're not at 65 either. The principle still applies — every year you wait makes a real difference. Not "small" difference. **Real** difference.

---

## 5. Common mistakes

### Mistake 1: Linear thinking about exponential things

Most people's brains naturally think linearly. "Twice the time = twice the result." Compound interest is exponential — twice the time is *much* more than twice the result. This is why people underestimate both the power of saving early and the danger of debt building up.

### Mistake 2: Underestimating small rate differences

"6% vs 8% — small difference, who cares."

Run 30 years on 10,000 BDT:
- At 6%: 10,000 × (1.06)³⁰ = 57,435 BDT
- At 8%: 10,000 × (1.08)³⁰ = **1,00,627 BDT**

A "small" 2% difference becomes nearly 2× over 30 years. Rate matters enormously over time.

### Mistake 3: Ignoring rate when borrowing

People will haggle endlessly over the price of a phone, then sign a loan at any rate. The interest rate on borrowed money is often more important than the price of the thing you bought.

### Mistake 4: Trying to time the market instead of letting time compound

People delay starting their DPS because "the market might dip" or "I'll start when I have more." Every month you delay, you give up some compounding tail. The best time was 10 years ago. The second best time is today.

### Mistake 5: Believing "guaranteed high return" claims

If someone offers 100% return per year, that's saying your money doubles every year. 1 taka becomes 1,024 taka in 10 years. After 30 years, 1 taka becomes 1 *billion* taka. If this were possible, everyone would do it. **It isn't possible.** "Guaranteed high returns" defies the math of compounding — the universe would run out of money. Anyone claiming it is lying.

### Mistake 6: Confusing "what I owe" with "what it will cost me"

If you owe 1,00,000 at 30% interest and you don't pay it down, it doesn't stay 1,00,000. Five years later it's 3,71,000. Ten years later, 13,79,000. Your "1 lakh debt" is actually a "14 lakh debt by year 10 if untouched." Compound interest cuts both ways.

---

## 6. Try this today (the 30-minute exercise)

### Step A — Compute your DPS scenario (10 min)

You don't have a DPS yet. But play with what would happen if you opened one in Stage 3.

Use the Rule of 72 mentally first:
- At 10% per year, money doubles every ~7.2 years
- So 1,000 BDT becomes 2,000 in 7.2 years, 4,000 in ~14.4 years, 8,000 in ~21.6 years, 16,000 in ~28.8 years

That's per 1,000 BDT, deposited *once* and left alone. Now imagine you deposit 1,000 every month.

Use this rough table for 10% annual return, monthly deposits:

| Monthly deposit | Value at year 5 | Value at year 10 | Value at year 20 | Value at year 30 |
|---|---|---|---|---|
| 500 BDT | 38,800 | 1,03,000 | 3,80,000 | 11,35,000 |
| 1,000 BDT | 77,500 | 2,06,000 | 7,60,000 | 22,70,000 |
| 2,000 BDT | 1,55,000 | 4,12,000 | 15,20,000 | 45,40,000 |
| 5,000 BDT | 3,87,500 | 10,30,000 | 38,00,000 | 1,13,50,000 |

**Reflect:** even 500 BDT/month — a number you could probably manage even now — becomes over 11 lakh in 30 years. *Without doing anything else.* Just consistency × time.

> Write down: "If I start putting ___ BDT/month into a DPS at Stage 3, in 20 years I'll have approximately ___ BDT."

### Step B — Compute one of your debts compounding (10 min)

Pick your highest-interest debt. Suppose it's the chit fund at 1,90,000 BDT at 5%/month.

The monthly interest alone (if you paid nothing toward principal):
> 1,90,000 × 0.05 = **9,500 BDT/month, just for being indebted**

If you don't pay even that much, the principal grows. Suppose you pay only 4,000/month for a year, and don't add new debt:
- Month 1: 1,90,000 → grows 5% → 1,99,500 → pay 4,000 → 1,95,500
- Month 2: 1,95,500 → grows 5% → 2,05,275 → pay 4,000 → 2,01,275
- ...
- After 12 months: balance ≈ 2,30,000

You paid 48,000 in the year, and the loan grew from 1,90,000 to 2,30,000 — got 40,000 *worse*. That's a 90,000 BDT swing against you in one year.

Now compute the minimum payment to *stop the principal from growing*. (Hint: it's just the monthly interest.)

> Write down: "On my ___ debt, the minimum I must pay each month to stop growth is ___ BDT."

This is the most important monthly number on your debt list.

### Step C — Mental math practice (5 min)

Try these without a calculator. Use Rule of 72.

Answers: 1) 8 yr, 2) 6 yr, 3) 18% (plausible but high — possible from a good stock portfolio long-term, not "guaranteed"), 4) every 3 yr, 5) ~4 lakh.

## Closing thought

<script type="text/markdown" id="lesson-3"># Day 3 — Inflation + Real Return

Yesterday you learned that money in a DPS can grow to 11 lakh over 30 years. Today you'll learn something uncomfortable: that 11 lakh in 30 years won't be worth what 11 lakh is worth today. By a long shot. Understanding this is the difference between feeling rich and actually being rich.

---

## 1. Why this matters

Imagine your grandfather sometime in 1980, putting 10,000 BDT in a steel box under his bed. He locks it. Forgets about it. You find it 45 years later — in 2025.

The note inside says: "For my grandchildren. 10,000 BDT — a small fortune."

In 1980, 10,000 BDT could buy:
- About 2 grams of gold
- A reasonable motorcycle
- Several months of rent in Dhaka

In 2025, 10,000 BDT can buy:
- About 0.1 gram of gold
- A mid-tier phone (used)
- About a week of rent in Dhaka

The taka note didn't change. The 10,000 number is still 10,000. But the *purchasing power* of that money fell by roughly 90%. Your grandfather thought he was leaving you something. He was, technically. But inflation ate it while he wasn't looking.

**This is inflation.** It's a silent, constant force — like gravity for money. And almost nobody factors it correctly into their financial decisions.

The other concept today — **real return** — is the simple corrective lens that lets you see past the illusion. Once you have this lens on, you'll start noticing that many "good returns" are actually wealth-destroying, and many "safe investments" are quietly losing you money.

---

## 2. The concept

### Inflation (মূল্যস্ফীতি)

**Definition:**
> Inflation is the general rise in prices of goods and services over time. Equivalently: the loss of purchasing power per unit of currency.

If a sack of rice cost 1,000 BDT last year and 1,090 BDT this year, that's roughly 9% food inflation. **Inflation is usually measured as an annual percentage.**

Bangladesh inflation (rough historical average):
- 1990s: ~6%
- 2000s: ~7%
- 2010s: ~6–7%
- 2020s so far: ~7–10% (recent surge driven by global energy + food + currency factors)

For our purposes, **assume Bangladesh inflation is roughly 8–9% per year right now.** Higher than countries like Singapore (1%) or US (3%), lower than Argentina (200%+) or Lebanon.

### Why inflation happens (briefly)

Three main drivers, simplified:
1. **More money chasing same goods** (when the central bank prints / lends too much, or when demand outpaces supply)
2. **Cost-push** (energy / commodities get more expensive, all goods made with them get expensive)
3. **Currency weakening** (Bangladesh's taka has weakened against the US dollar over time — imported goods cost more in taka)

You don't need to master macro-economics. You just need to **assume inflation is always happening** and plan around it.

### Real return (প্রকৃত return)

**Definition:**
> Real return = Nominal return − Inflation
>
> (Or more precisely: Real return ≈ (1 + nominal) / (1 + inflation) − 1, but the subtraction is close enough for most decisions.)

**Nominal return** is what's printed on the label — "this DPS pays 10%."

**Real return** is what you actually gained in purchasing power.

If your DPS earns 10% nominal and inflation is 9%, your real return is:
> 10% − 9% = **1% real**

You feel like you grew 10%. But you only grew 1% in terms of what you can actually buy. The other 9% of your "return" just kept you even with the rising tide of prices.

### The hidden tax of cash

If you keep money in cash (under the mattress) or in a 0%-interest checking account, your nominal return is 0%. So your real return is:
> 0% − 9% inflation = **−9% per year**

You're losing 9% of your real wealth every year you hold cash that isn't growing.

This is the **single most important insight of Day 3:** doing nothing with money is not "safe." It's an active loss of approximately 9% per year. It just feels safe because the *number* doesn't change.

---

## 3. Worked examples

### Example A — The "savings" that lost money

Imagine your mother put 1,00,000 BDT in a regular savings account in 2010 earning 4%/year nominal. Inflation averaged ~7% over that period.

In 2025 (15 years later) at 4% compounded:
- Nominal balance: 1,00,000 × (1.04)^15 = **1,80,094 BDT**
- Looks like she nearly doubled her money!

But measured in 2010 purchasing power:
- The 1,80,094 in 2025 has the buying power of 1,00,000 × (1.04/1.07)^15 ≈ **65,000 BDT in 2010 terms**

She *lost* 35,000 BDT of real wealth while feeling like she gained 80,000. **This is what happens to people who park money in low-yielding savings accounts during inflation.**

### Example B — The real return of common Bangladeshi instruments

Assume Bangladesh inflation is 9% per year. Let's grade each instrument:

| Instrument | Nominal | Inflation | Real return |
|---|---|---|---|
| Cash (mattress / bKash wallet) | 0% | 9% | **−9%** ⚠️ |
| Standard savings account (Sonali Bank, etc.) | 3–4% | 9% | **−5 to −6%** |
| IBBL Mudaraba Savings | ~6% | 9% | **−3%** |
| IBBL Mudaraba Term Deposit (1-year) | ~7–8% | 9% | **−1 to −2%** |
| DPS / FDR (5–10 yr lock) | ~10–11% | 9% | **+1 to +2%** |
| Sanchaypatra (5-year) | ~11% | 9% | **+2%** |
| DSE blue-chip stocks (long-term avg) | ~12–15% | 9% | **+3 to +6%** |
| International halal ETF (Wahed, ISWD) | ~8–10% USD | 9% BDT* | depends on taka exposure |

*The international comparison gets complex because of currency. For now: most Bangladeshi instruments *just barely* beat inflation. Some lose to it. Cash always loses.

### Example C — The proper way to think about an offer

Suppose a relative says: *"I have a great real estate scheme. You give me 5 lakh today, in 5 years I give you 8 lakh. Guaranteed."*

Sounds great? Let's compute.

Nominal return: (8 / 5)^(1/5) − 1 = 9.86% per year compound

Subtract inflation at 9%: real return ≈ **0.86% per year**

You'd be locking up 5 lakh for 5 years to gain less than 1% in real purchasing power — *if* the deal is real and *if* inflation stays at 9%. If inflation is 10%, you lose. If inflation is 11%, you definitely lose.

**Versus:** a 5-year Sanchaypatra would give you roughly the same real return with zero risk and government backing.

The "great" 8-lakh-in-5-years deal isn't great. It's barely matching inflation. And it carries the risk that the relative defaults. Once you learn to convert nominal to real, all kinds of offers reveal themselves as bad deals.

### Example D — The 30-year purchasing power trap

Yesterday's example said a 2,000 BDT/month DPS becomes 45,40,000 BDT in 30 years at 10% nominal.

Now adjust for 9% inflation:
- Real growth rate ≈ 1% per year
- Real value at year 30 ≈ what 8,80,000 BDT can buy in *today's* purchasing power

So that "45 lakh in 30 years" actually has the purchasing power of about **8.8 lakh today**. Still meaningful — much better than zero — but a far cry from what the nominal number suggests.

**This isn't a reason to not save.** It's a reason to:
1. Save in instruments that beat inflation (DPS > savings account > cash)
2. Eventually move into things with higher real return (stocks, business ownership) once you're past Stage 3
3. Stop being impressed by big nominal numbers without checking the real return

---

## 4. Common mistakes

### Mistake 1: Thinking 0% is "safe"

Keeping cash in a non-interest account feels safe because the number doesn't go down. But in real terms, it goes down by inflation every year. A "safe" wallet of 1,00,000 today is 92,000 of purchasing power next year — and you didn't notice.

### Mistake 2: Falling for nominal "doubling" promises

"Your money doubles in 5 years!" Sounds amazing.
> Nominal return = 72/5 = 14.4% per year
> Real return at 9% inflation = ~5.4% per year

Better than savings, comparable to stocks, much worse than the hype suggests.

### Mistake 3: Comparing returns from different eras

Your father might remember "I got 13% on my FDR in 1995." But inflation in 1995 was also high. The real return then might have been similar to today's. Don't anchor to nominal numbers from past decades — adjust mentally for that era's inflation.

### Mistake 4: Ignoring inflation in long-term plans

"In 20 years, my kid will need 10 lakh for university." Probably true in *today's* taka. But 20 years from now, university will cost more like 40–60 lakh. If you plan for 10 lakh, you'll be short by 30–50 lakh when the bill arrives.

**The rule:** any future expense estimate should grow at inflation. "I need X today" + 20 years = "I'll need X × (1 + inflation)²⁰ then." At 9% inflation, X roughly **multiplies by 5.6 over 20 years.**

### Mistake 5: Saving in the wrong currency

If you're saving for a future expense priced in USD (like an international trip, foreign tuition, an imported laptop), then BDT savings face additional risk: not just BDT inflation, but BDT-USD weakening. Sometimes saving partly in USD-denominated instruments (or just thinking in USD terms for those goals) makes sense once you're at Stage 4+.

### Mistake 6: Believing "the 9% is just temporary"

Every year, people say "inflation is unusually high right now, it'll go back down." Maybe. But planning your life around "any moment now inflation will return to 3%" is wishful. Plan for what's actually happening, and be pleasantly surprised if it improves.

---

## 5. Try this today (the 30-minute exercise)

### Step A — Compute the real return of your own money (10 min)

Right now, where is most of your "money sitting around"? Add up everything:
- Cash on hand
- bKash / Nagad wallet
- Bank checking account (probably 0%)
- Bank savings account (probably 2-4%)
- Any DPS / FDR (probably 6-11%)

For each, write the **nominal return** (use a typical rate if you don't know exactly).

Now compute the real return for each: nominal minus 9% (Bangladesh inflation).

Total it up, weighted by how much is in each:

> "My weighted average real return on my current money is approximately ___ % per year."

Most people: this number is **negative**. Don't be surprised. Now you know.

### Step B — The future-cost exercise (10 min)

List 3 expenses you'll definitely have in the future:

| Expense | When | Today's cost | Inflation factor | Real future cost |
|---|---|---|---|---|
| Kid's college | 15 years from now | 10,00,000 | (1.09)^15 ≈ 3.64 | **36,40,000** |
| Hajj for you + spouse | 20 years from now | 8,00,000 | (1.09)^20 ≈ 5.60 | **44,80,000** |
| Your retirement income (per year) | 30 years from now | 6,00,000 / yr | (1.09)^30 ≈ 13.27 | **79,60,000 / yr** |

Don't be alarmed by the numbers. They're not predictions of disaster — they're just the math of inflation. The point of computing them is so that when you eventually start planning for these, you plan with the right target.

> Write down 3 of *your* future expenses with adjusted figures.

### Step C — Identify your "real loss" zones (5 min)

Look at your money:
- Anything sitting in cash, bKash, or 0% accounts? → That's losing 9% real per year. Identify how much.
- Anything in a 2-4% savings account? → Losing 5-6% real per year.

> "I am currently losing approximately ___ BDT per year in real terms by holding money in low/no-yield places."

This isn't a guilt trip. It's a measurement. You can't fix what you can't measure.

- Concepts tab: mark **Inflation** and **Real return** as Learning or Mastered
- Notes tab: write reflections
- Study Log: add today as Done

## Closing thought

You now have a lens that most people in your country don't carry. From today on, when someone shows you a "great return," you'll quietly subtract 9% in your head. When you see your bank account "stable" at 50,000 for a year, you'll know you actually lost 4,500 of real purchasing power. When you plan future expenses, you'll multiply by the right factor.

This is what real financial literacy looks like: not knowing more numbers, but knowing how to read the numbers other people show you.

<script type="text/markdown" id="lesson-4"># Day 4 — Time Value of Money

You've now seen compound interest (Day 2) and inflation (Day 3). Today we combine them into the single tool that powers every financial decision: time value of money. Once you can use this, you can evaluate any loan, any insurance plan, any "great deal" — and tell whether it's actually a great deal.

---

## 1. Why this matters

Three real situations you (or someone you know) will face this year:

**Situation A:** A client offers you 30,000 BDT today for a project, or 36,000 BDT in 3 months "with a small bonus for waiting." Which do you take?

**Situation B:** An insurance agent pitches a plan: pay 30,000 BDT/year for 10 years; get 5,00,000 BDT back at year 20. Sounds like free money?

**Situation C:** Someone offers to buy your laptop now for 40,000 BDT, or pay you 50,000 in 6 months. They seem honest. Which is better for you?

Without time value of money, you'd answer these based on gut feel. With it, you'd answer them with a calculation. **Gut feel is often wrong**, especially when long time horizons or big inflation numbers are involved.

This is the single most useful "spreadsheet skill" most adults never learn. Let's fix that.

---

## 2. The concept

### The core idea (সময়ের মূল্য)

> **A taka in your hand today is worth more than a taka promised to you in the future.**

Three reasons why:

1. **Opportunity cost.** Today's taka could be invested to become more. A taka next year can't go back in time to do that.
2. **Inflation.** Tomorrow's taka buys less than today's because of rising prices.
3. **Risk.** A promise of future money carries the risk that something happens between now and then — the payer defaults, the deal collapses, plans change. Today's cash has zero such risk.

The size of this gap between "today's taka" and "future taka" depends on:
- The interest rate / return rate available (your opportunity cost)
- The inflation rate
- The risk involved
- How long you have to wait

### Two key terms

**Present Value (PV)** — what something in the future is worth *today*.
**Future Value (FV)** — what something today will be worth *later*.

The formulas (don't memorize, but understand):

> **FV = PV × (1 + r)ⁿ** (compound a present amount forward in time)
>
> **PV = FV / (1 + r)ⁿ** (discount a future amount back to today)

Where:
- **r** = your "discount rate" per period — usually a realistic rate of return you could otherwise earn
- **n** = number of periods (usually years)

### The discount rate

This is the trickiest part — and the most important.

Your **discount rate** is roughly: *the return you could realistically earn on money if you had it today, accounting for inflation and risk.*

For a Bangladeshi freelancer with limited investment access today, a reasonable personal discount rate is approximately:
- **9%** if comparing to inflation alone (you'd need to beat that just to break even)
- **11%** if you'd realistically use the money to buy Sanchaypatra
- **13–15%** if you'd realistically deploy it into something productive (a niche course that raises your rate, a tool that earns you back)
- **30%** if you'd realistically pay down credit card debt with it

**The right discount rate depends on what you'd actually do with the money.**

For most of today's exercises, **use 12% as your default discount rate** unless the situation makes another rate clearly correct.

---

## 3. Worked examples

### Example A — Client offer (Situation A from above)

**The offer:** 30,000 today vs 36,000 in 3 months.

**Method:** find the present value of the 36,000 future amount, then compare.

> PV of 36,000 in 3 months at 12%/year discount rate (1% per month):
> PV = 36,000 / (1.01)³ = 36,000 / 1.0303 = **34,940 BDT**

The future 36,000 is worth 34,940 in today's taka. That's MORE than the 30,000 offered today.

**Verdict:** take the 36,000 in 3 months. (Assuming the client is trustworthy. Risk shifts the answer.)

But here's a subtlety: what if your "discount rate" is really high because you have a 60% APR chit-fund debt? Then 1 month of waiting costs you 5%, and 3 months costs you 15.7% of buying power *because* of your debt situation. Then:

> PV at 60%/year (5% per month):
> PV = 36,000 / (1.05)³ = 36,000 / 1.1576 = **31,098 BDT**

Even at that horrific discount rate, future 36,000 is barely better than today's 30,000. The chit-fund debt makes "wait 3 months" much more expensive — because every month means another 5% interest hit.

**This is why your personal discount rate matters.** Someone with no debt and good investment options has a different right answer than someone with a high-rate loan.

### Example B — The insurance plan (Situation B)

**The pitch:** pay 30,000/year for 10 years (total 3,00,000), get 5,00,000 at year 20.

Looks like 5 lakh for 3 lakh — 67% gain! But:
1. You're putting in 30,000 each year, not all at once
2. The payoff is at year 20, not year 10
3. We need to compare what else you could have done with that 30,000/year

**Two-step calculation:**

Step 1: what would 30,000/year invested at 12% for 10 years, then left to grow for another 10 years, become?

After 10 years of contributions:
> FV of 30,000/yr at 12% for 10 yr = approximately 5,26,000 BDT

That 5,26,000 then sitting for another 10 years at 12%:
> 5,26,000 × (1.12)^10 = 5,26,000 × 3.11 = approximately **16,35,000 BDT**

The insurance pays 5,00,000 BDT at year 20. The alternative (investing same money yourself in a DPS) would have given you **about 3× as much**.

**Verdict:** the insurance plan is mathematically a poor "investment." It may still make sense if you actually need the *insurance* (death benefit, for example) — but as a savings vehicle, it's losing to a simple DPS.

This is the trick most life insurance / endowment plans use: they show you a big nominal number ("5 lakh!") without showing what your same money would have done elsewhere. Now you can see through it.

### Example C — Laptop offer (Situation C)

40,000 today vs 50,000 in 6 months. Use 12% discount rate (1% per month):

> PV of 50,000 in 6 months = 50,000 / (1.01)^6 = 50,000 / 1.0615 = **47,098 BDT**

Future 50k = 47,098 in today's terms. That's more than 40,000 today.

**Verdict:** take the 50,000 in 6 months, *if* you trust the buyer.

But risk matters. If you give it a 20% chance the buyer doesn't pay (changes mind, disappears, etc.), then:
> Risk-adjusted value = 47,098 × 0.80 = 37,678 BDT

Now it's LESS than the 40,000 today.

**Lesson:** time value of money is a starting point. You always also have to subtract for risk.

### Example D — Your own freelance pricing

A productized service template:
- Option 1: 70,000 BDT, paid 100% upfront before work starts
- Option 2: 80,000 BDT, paid 50% upfront and 50% on delivery (project takes ~2 months)

For the client, Option 1 is more attractive (10,000 cheaper). For you?

Option 1: 70,000 today.
Option 2: 40,000 today + 40,000 in 2 months.

> PV of Option 2 at 12% discount: 40,000 + 40,000 / (1.01)² = 40,000 + 39,212 = **79,212 BDT**

Option 2 is worth 9,212 BDT more in present value terms. **So when you offer "10% discount for paying upfront," you're actually losing slightly less than 10% of value — the discount almost matches your real opportunity cost.**

If you'd been at a higher discount rate (because of debt or great alternative uses), the analysis changes. Your discount rate is your competitive lever.

---

## 4. Common mistakes

### Mistake 1: Comparing future amounts to present amounts directly

"5 lakh in 20 years is better than 3 lakh today." False — until you discount the future amount back. The whole point of time value of money is that you can't compare them directly.

### Mistake 2: Using the wrong discount rate

People use 0% (treating future money as equal to present money) or 30% (their credit card rate, when they wouldn't actually pay off the card) — both wrong. **Your discount rate should be what you'd realistically do with the money.** For most life decisions, 10-15% is reasonable in Bangladesh's environment.

### Mistake 3: Ignoring inflation in long-horizon decisions

For decisions 1-3 years out, inflation is small. For decisions 10+ years out, inflation dominates. A "5 lakh in 25 years" promise is worth — in today's purchasing power — maybe 60,000 BDT. People hear 5 lakh and feel rich. Now you won't.

### Mistake 4: Forgetting risk

Every future payment carries risk. The further out, the riskier. The less established the counterparty, the riskier. Discount for risk on top of time. Most insurance, lending, and investment sales pitches assume zero risk in their projections — that's why projected returns always look better than realized returns.

### Mistake 5: Discounting too aggressively

The flip side: someone uses a 30% discount rate when their realistic alternative is a 4% savings account. They reject good long-term deals because they over-discount. Common in people who've been burned before and now distrust the future.

### Mistake 6: Treating money you'll get as money you already have

A client signed a contract for 1,00,000 to be paid in 3 months. You don't have 1,00,000 — you have a *claim* on 1,00,000 that's worth about 97,000 today (and less when risk is factored in). Don't spend it before it arrives.

---

## 5. Try this today (the 35-minute exercise)

### Step A — Evaluate one real "offer" you're aware of (15 min)

Pick one from your life:
- A freelance contract that pays "in 60 days net"
- An insurance plan someone pitched you
- A "scheme" a relative is involved in
- A buy-now-pay-later option a store offered you
- A relative offering you "1 lakh in 2 years" if you give 70k now

Compute its present value. Show your work:

> 2. **Discount rate to use:** ______ % per year. (Default: 12%.)
> 3. **Periods:** ______ months / ______ years.
> 4. **PV calculation:** _____ / (1 + 0.12/12)^months = _______
> 5. **Verdict:** Is the present-value worth more or less than what they're asking?

Write it out in the Notes tab. Tag it `#day4-exercise`.

### Step B — Compute the "right" discount for your discount (10 min)

Suppose a client wants to pay you 1 month later than you'd prefer. What discount can you offer (or what surcharge can you charge) to make it neutral?

Use 12% annual rate (1% monthly):
- 1 month delay → 1% discount you'd take to be made whole
- 3 month delay → ~3% discount
- 6 month delay → ~6% discount

If you're at a 30% rate because of debt — those numbers double or triple.

> "My current 'monthly discount rate' (what 1 month of delay costs me) is approximately ___ %."

If high, this argues for asking 100% upfront or charging a meaningful late surcharge.

### Step C — Build your "future expense" plan (10 min)

Re-do yesterday's future-expense table — but now using PV thinking.

For each future expense, ask: *what would I need to put away today, growing at 11% (Sanchaypatra), to have enough by then?*

| Expense | When | Future cost | Today's deposit needed at 11% |
|---|---|---|---|
| Kid's college | 15 years | 36,40,000 | 36,40,000 / (1.11)^15 = **7,60,000** |
| Hajj | 20 years | 44,80,000 | 44,80,000 / (1.11)^20 = **5,55,000** |
| ... | | | |

Don't be alarmed — you don't need to deposit 7.6 lakh today. The math shows that you'd need to deposit, say, **35,000/year for 15 years** to reach that same future amount. Time + monthly investments do the work.

This is just to give you a feel for how PV thinking works at long horizons.

## Closing thought

2. **Discount inflation** to see real value

<script type="text/markdown" id="lesson-5"># Day 5 — Assets vs Liabilities + Income vs Wealth

Today is a mindset shift, not a math lesson. You'll learn to look at every object, every account, every job through a single lens: **does this put money in my pocket or take it out?** That one question, applied consistently for the next 30 years, will change everything.

---

## 1. Why this matters

A real story (composite of many).

Ahmed earns 1,80,000 BDT/month as a senior engineer in Dhaka. He drives a 25-lakh car (financed). Lives in a 35,000/month flat. iPhone 15. Sends his kid to an English-medium school for 25,000/month. Vacations in Cox's Bazar twice a year. To anyone looking, Ahmed is "doing well."

Karim earns 50,000 BDT/month as a small-business shopkeeper. He owns the shop (parents helped him buy it). Drives a 4-year-old motorcycle, no loan. Lives in a 12,000/month flat in Mirpur. iPhone is 4 generations old, works fine. Sends his kid to a Bengali-medium good school for 4,000/month.

Who's wealthier?

After 10 years:
- **Ahmed** has 18 lakh in debt (car still has 4 years on the loan), 80,000 in savings, lives paycheck-to-paycheck. Total **net worth: −16 lakh** (after all assets and debts).
- **Karim** owns a shop worth ~30 lakh now (it appreciated), has 8 lakh in DPS + Sanchaypatra, no debt. **Net worth: +38 lakh**.

Ahmed earned 3.6× more. Karim is 54 lakh ahead.

Why? Because:
- Ahmed accumulated *liabilities that look like assets* (financed car, leased lifestyle)
- Karim accumulated *real assets* (a shop that produces income)
- Ahmed has high income, low wealth
- Karim has modest income, growing wealth

**The lesson:** what you own determines whether your income builds you up or burns out. Most people in middle-income jobs in Bangladesh accumulate liabilities for 30 years and end up Ahmed. A small percentage accumulate assets and end up Karim. The difference isn't earning power. It's understanding the difference between the two.

---

## 2. The concept

### Assets vs Liabilities — the simple definition

The most useful definition (popularized by Robert Kiyosaki in *Rich Dad Poor Dad*, but the idea is older):

> **An asset puts money in your pocket.**
> **A liability takes money out of your pocket.**

This is different from the accounting definition you might find in a textbook. Both are valid; this one is more useful for personal financial decisions.

**Examples of true assets** (put money in your pocket):
- A rental property earning monthly rent
- A DPS or Sanchaypatra earning interest
- A stock portfolio paying dividends
- A skill you can sell (your dev skill → freelance income)
- A business that produces profit
- Royalties from a book, course, or product
- A productive piece of equipment (a sewing machine for a tailor, a delivery vehicle for a courier)

**Examples of true liabilities** (take money out of your pocket):
- A car (insurance, fuel, maintenance, depreciation, loan EMI)
- A house you live in (maintenance, property tax, opportunity cost)
- A phone (monthly bill, depreciates fast, replacement)
- Most subscriptions (Netflix, gym, etc.)
- Credit card debt (interest)
- Personal loans
- A boat, a luxury watch, designer clothes

**Things that can be either, depending on how you use them:**
- A car used for Uber/Pathao → asset (produces income beyond its cost)
- A car used only to commute → liability
- A laptop you freelance with → asset (if it generates more income than its cost)
- A laptop you use only for entertainment → liability
- A house you rent out → asset
- A house you live in → mostly liability (but with some asset-like value as forced savings if it appreciates)

### Why people get this wrong

Banks, sellers, and society have an interest in calling liabilities "assets":
- A car salesman calls a car "an investment in mobility"
- A bank shows your home loan as an "asset" in your name
- People proudly call their house their "biggest asset" — when the bank actually owns most of it and they pay the mortgage

The world wants you to buy things. Calling those things "assets" makes you feel good about the purchase. **The simple test cuts through this: did the money flow toward you or away from you in the past month because of this thing?**

If it flowed away (insurance, maintenance, EMI, depreciation): liability.
If it flowed toward you (rent collected, interest earned, income produced): asset.

### Income vs Wealth

Closely related but distinct:

**Income** — money arriving on a regular basis (salary, freelance payments, business profit, interest from investments). A *flow*.

**Wealth** — accumulated assets minus debts. A *stock*. What you have, not what's coming in.

**Two failure modes:**

1. **High income + Low wealth.** The doctor making 5 lakh/month but spending all of it. The Bollywood star who goes bankrupt three years after the last hit. Earned a lot. Owns nothing.

2. **Low wealth + No income.** The retiree whose savings ran out at age 70 because nothing was producing income anymore. Once-had-it-all became has-nothing.

**The goal** is to convert income into wealth — specifically, into income-producing assets that will themselves earn income later.

> Income → Buy assets → Assets produce more income → Buy more assets → Wealth.

This loop is the entire game. Income that doesn't get converted to assets just leaves through your spending. Most adults run this loop in reverse (income → buy liabilities → liabilities cost more money → need more income → buy more liabilities) and wonder why they never get ahead.

### The wealth equation, simplified

> **Wealth at year N = (Initial wealth) + Σ (each year's cash flow → asset purchase) × (compound growth of those assets)**

Translation: wealth = how long you've been converting positive cash flow into productive assets × the growth those assets produced.

This is also why time is so important (Day 2): the assets bought in year 1 have compounded more by year 30 than the assets bought in year 25.

---

## 3. Worked examples

### Example A — The "smart" car decision

Ahmed buys a 25-lakh car on a 20% down + 5-year loan at 12% interest.
- Down payment: 5,00,000 (cash gone)
- Monthly EMI: ~44,500 BDT for 60 months
- Annual fuel + maintenance + insurance: ~80,000 BDT
- Depreciation: a 25-lakh car is worth maybe 15 lakh after 5 years

Total cost over 5 years:
- Down payment: 5,00,000
- EMIs total: 44,500 × 60 = 26,70,000
- Operating costs: 80,000 × 5 = 4,00,000
- **Total spent: 35,70,000 BDT**
- Asset value after 5 years: 15,00,000 BDT
- **Net outflow over 5 years: 20,70,000 BDT**

Now imagine instead: Ahmed bought a 5-lakh used motorcycle in cash and invested the rest at 11% Sanchaypatra over 5 years:
- Initial investment available: 25,00,000 − 5,00,000 (motorcycle) = 20,00,000 invested
- After 5 years at 11%: 20,00,000 × (1.11)^5 ≈ 33,70,000
- Motorcycle worth: 2,50,000 (used)
- **Net position: +36,20,000**

The two paths differ by approximately **57,00,000 BDT over 5 years.** That's why "the right car decision" is one of the most important early-life financial decisions you make.

### Example B — Skill as your biggest asset

Your freelance dev skill: assume 70,000 BDT/month average.

Annual income from this skill: ~8,40,000 BDT
Over 30 years (rough estimate, assuming you maintain it): ~2.5 *crore* total earnings.

**Your skill is a 2.5 crore asset.**

Bigger than most houses people buy. Bigger than most cars. Bigger than most stock portfolios people ever build.

How are you investing in it?
- Daily skill upgrade? (Maintains/grows the asset's earning power)
- Niche development? (Doubles or triples the asset's hourly rate)
- Productization? (Converts hourly capacity into scalable revenue)

**Most people treat their skill as fixed and try to optimize everything else.** The reverse is more powerful: treat skill as the #1 asset, and invest in growing it relentlessly. Day 8 (which you'll do in `08-skill-and-income.md`) is the deep dive on this.

### Example C — The household audit

Let's audit a hypothetical household's "stuff":

| Item | Value | Asset or Liability? | Monthly impact |
|---|---|---|---|
| Bank account (savings) | 4,500 | Asset (tiny one) | +20 (interest) |
| DPS / Sanchaypatra | 0 | — | 0 |
| Laptop (used for freelance) | 50,000 | **Asset** (enables income) | +70,000 income/month |
| Phone | 25,000 | Liability | −500 bill + −fast depreciation |
| Motorcycle | 1,00,000 | Liability | −3,000 fuel + maintenance |
| Furniture | 80,000 | Liability | depreciation |
| Credit card balance | −90,000 | **Liability** | −2,250/mo interest |
| Personal loan | −2,80,000 | **Liability** | −EMI/mo |
| Market loan | −1,90,000 | **Liability** | −9,500/mo interest |
| Family loan | −1,40,000 | **Liability** | −interest free, but social cost |
| Skill (freelance dev) | ~25,00,000 (5-yr earning power) | **Asset (#1)** | +70,000/month |

**Insight:** the most valuable asset isn't anything physical. It's the skill. It produces 70k/month — more than everything else combined. So the question isn't "how do I save more" but "how do I grow this asset and stop letting liabilities drain the surplus it produces?"

### Example D — Income vs Wealth illustrated

Two people, both age 35.

**Person X:** salaried executive, 2,00,000 BDT/month, spending 1,80,000. No debt, but no investments either. Owns furniture, phone, modest car (financed, almost paid off). After 10 years (age 45): wealth ≈ 24 lakh (mostly in slightly-appreciated apartment they bought).

**Person Y:** small business owner, 60,000 BDT/month from the business. Spends 40,000. Re-invests 10,000 in business growth and saves/invests 10,000/month. After 10 years (age 45): business is now generating 1,80,000/month, has 18 lakh in DPS/stocks, total net worth ~80 lakh.

Same starting age. Person X earned much more income but accumulated barely more wealth. Person Y converted positive cash flow into productive assets year after year. **Income lost the race against wealth.**

---

## 4. Common mistakes

### Mistake 1: Calling a primary residence "your biggest asset"

A home you live in:
- Costs maintenance every year (1-2% of value)
- Costs property taxes
- Costs interest if mortgaged
- Has opportunity cost (the down payment could have been invested)

It does *appreciate* slowly in some markets, which has asset-like value. But the day-to-day cash flow is negative. Calling it an "asset" makes you feel rich while you're spending money to live in it. Honest framing: a place to live, with some forced-savings benefit, and meaningful liability characteristics.

### Mistake 2: Confusing cash with wealth

"I have 50,000 BDT in my bKash" doesn't mean you're wealthy. It means you have 50,000 in liquid cash. Wealth requires accumulated *productive* assets. Cash is one type of asset, but a poor one (it doesn't grow, and inflation eats it — see Day 3).

### Mistake 3: Earning more without converting it

A common pattern: someone gets a raise from 50k to 80k. They feel richer immediately. Within 6 months, their expenses have risen to consume the extra 30k. **Net wealth-building from the raise: 0.**

The discipline of converting raises into asset accumulation — not lifestyle inflation — is what separates wealth-builders from treadmill-runners.

### Mistake 4: Thinking jewelry / gold / collectibles are assets

Gold has a slightly asset-like quality (often beats inflation over very long horizons). But it doesn't *produce* income — it just sits there. Wedding jewelry typically has even worse economics (markup at purchase, discount at resale, no income). These can be cultural / safety stores of value, but they're inferior assets compared to DPS, sukuk, stocks.

### Mistake 5: Buying liabilities to "feel successful"

A common loop: you make some money → buy a watch / car / phone / clothing item → feel like you're "arriving" → repeat. Each purchase is a liability. Each makes you poorer, not richer. The genuine signal of wealth is *what you DON'T have to buy to feel okay about yourself*.

### Mistake 6: Underestimating your own skill as an asset

People will spend hours optimizing a 5% savings rate on 50,000 (yielding maybe 200/month extra) while never spending one hour learning a skill upgrade that could raise their income by 20%. The skill-asset is usually the highest-leverage place to invest your time. Don't ignore it.

---

## 5. Try this today (the 40-minute exercise)

### Step A — The honest asset/liability audit (15 min)

List every "thing" you own or owe. For each:
1. Is this thing currently putting money in your pocket or taking money out?
2. Net monthly cash impact (positive or negative)?
3. Classify as Asset or Liability.

Be brutal. Most people are surprised how few real assets they have.

|---|---|---|
| | | |
| | | |
| | | |
| | | |

When you're done, sum the monthly impacts.

For most people, this is *negative* — the things they own cost them more than they generate. The job/skill makes up for it. Sometimes barely.

### Step B — Identify your real assets (10 min)

1. _________________
2. _________________
3. _________________

If your list is empty except for "my skill" — that's normal at Stage 0-1. Your job now is to start building one more asset over the next 2 years. Just one. Could be:
- A small DPS that starts producing interest
- A productized service template that earns recurring income
- A micro-SaaS that earns MRR
- A skill specialty that earns 2-3x the generalist rate

### Step C — Income vs Wealth check (10 min)

Compute:

> **Wealth** (net worth from Day 1): ___________
>
> Wealth ÷ Income ratio = ___________

A healthy ratio at different life stages:
- 20s: any positive number is great (you're young)
- 30s: ideally 1-3× annual income in net worth by mid-30s
- 40s: ideally 5-8× annual income
- 50s: ideally 10-15× annual income (to enable retirement)
- 60s: ideally 15-25× annual income

If you're below the typical range for your age — that's information, not a verdict. The next 5 years of conversion (income → assets) is where the catch-up happens.

### Step D — The one decision rule (5 min)

For the rest of this course, and ideally the rest of your life, apply this rule to every significant purchase:

> *Will this item, on net, put money in my pocket or take money out?*
>
> If "put money in" → consider it carefully (and check if it's overpriced)
> If "take money out" → that's fine if it's a need, dangerous if it's a want being justified

This isn't anti-consumption. You will buy phones, eat out, take vacations. The point is to do those things with eyes open — not while telling yourself "this is an investment" when it isn't.
